article_pattern: "^(Art(?:icle)?\\.?\\s+[LRD]\\d{3,4}-\\d{1,3}(?:-\\d{1,3})?)"

# --- Séparateurs de structure hiérarchique ---
hierarchy:
  - level: 1
    label: LIVRE
    pattern: "^LIVRE\\s+(\\w+)"
  - level: 2
    label: TITRE
    pattern: "^TITRE\\s+(\\w+)"
  - level: 3
    label: CHAPITRE
    pattern: "^CHAPITRE\\s+(\\w+)"
  - level: 4
    label: SECTION
    pattern: "^Section\\s+(\\d+)"

# --- Taille des chunks ---
chunk_size: 800
chunk_overlap: 100
min_chunk_size: 50

# --- Métadonnées extraites automatiquement par chunk ---
extract_metadata:
  - article_id
  - article_type
  - livre
  - titre
  - chapitre
  - url_legifrance
